<DOCTYPE!>
    <HTML>
        <head>
<h1>IMAGE ALIGNMENT </h1>
<title>IMAGE</title>
<style>
    h1{
        text-align: center;
    }
    h2{
        position:relative;
        z-index:10;
    }
    h3{
        position:absolute;
        z-index:-200;
    }
    .kit1{
        z-index:100;
        position:relative;
        width:100px;
        height:200px;
    }
    .kit2{
        position:absolute;
        width:100px;
        height:200px;
        right:10px;
        top:100px;
    }
    .kit3{
        position:absolute;
        width:100px;
        right:20px;
        height:200px;
        bottom:20px;
    }
     .kit4{
        position:absolute;
        width:100px;
        height:200px;
        left: 10px;
        top:500px;
    }
    .dog{
        position:absolute;
        width:100px;
        height:200px;
        left:670px;
        top:250px;
    }
</style>
<body>
    <div>
        <img src="kit1.jpg" class="kit1">
        <h2>KITTY IMAGE</h2>
    </div>
        <div>
            <img src="kit2.jpg"class="kit2">
            <h3>KITTY IMAGE 2</h3>
        </div>
    <img src="kit3.jpg"class ="kit3">
    <img src="kit4.jpg"class ="kit4">
    <img src="dog.jpg"class ="dog">
</body>
        </head>
    </HTML>
</DOCTYPE>
