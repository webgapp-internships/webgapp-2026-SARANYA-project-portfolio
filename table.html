            border: none;
            border-radius: 5px;

        }

    <h2>Student Details Form</h2>

    <form>
        <label>Student Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Register Number</label>
        <input type="text" placeholder="Enter register number" required>

        <label>Email</label>
        <input type="email" placeholder="Enter email" required>

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number">

        <label>Department</label>
        <select>
            <option>Select Department</option>
            <option>CSE</option>
            <option>IT</option>
            <option>ECE</option>
            <option>EEE</option>
            <option>MECH</option>
        </select>

        <label>Year</label>
        <select>
            <option>Select Year</option>
            <option>I Year</option>
            <option>II Year</option>
            <option>III Year</option>
            <option>IV Year</option>
        </select>

        <label>Gender</label><br>
        <input type="radio" name="gender" class="gender"> Male
        <input type="radio" name="gender" class="gender"> Female
        <input type="radio" name="gender" class="gender"> Other
        <br><br>

        <label>Address</label>
        <textarea rows="4" placeholder="Enter address"></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
